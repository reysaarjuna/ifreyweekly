        <h2>Input Data Mahasiswa</h2>
        <form>
            <table>
                <tr>
                    <td><label for="nama">Nama</label></td>
                    <td>:</td>
                    <td> <input type="text" name="nama" id="nama" /></td>
                </tr>
                <tr>
                    <td><label for="NIM">UTS</label></td>
                    <td>:</td>
                    <td><input type="number" name="nim" id="nim" /> </td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td>:</td>
                    <td><input type="password" name="password" id="password"></td>
                </tr>
                <tr>
                    <td><label for="email">email</label></td>
                    <td>:</td>
                    <td><input type="email" name="email" id="email"></td>
                </tr>
                <tr>
                    <td><label for="nohp">No HP</label></td>
                    <td>:</td>
                    <td><input type="tel" name="nohp" id="nohp"></td>
                </tr>
                <tr>
                    <td><label for="website">Website</label></td>
                    <td>:</td>
                    <td><input type="url" name="website" id="website"></td>
                </tr>
                <tr>
                    <td><label for="tgl_lahir">Tanggal Lahir</label></td>
                    <td>:</td>
                    <td><input type="date" name="tgl_lahir" id="tgl_lahir"></td>
                </tr>
                <tr>
                    <td><label for="warna">Warna Favoit</label></td>
                    <td>:</td>
                    <td><input type="color" name="warna" id="warna"></td>
                </tr>
                <tr>
                    <td><label for="kepuasan">Tingkat Kepuasan</label></td>
                    <td>:</td>
                    <td><input type="range" name="kepuasan" id="kepuasan"></td>
                </tr>
                <tr>
                    <td><label>Jenis Kelamin</label></td>
                    <td>:</td>
                    <td>
                        <input type="radio" name="kelamin" id="pria" value="Pria" /><label for="pria">Pria</label>
                        <input type="radio" name="kelamin" id="wanita" value="Wanita" /><label for="wanita">Wanita</label>
                    </td>
                </tr>
                <tr>
                    <td><label>Hobi</label></td>
                    <td>:</td>
                    <td>
                        <input type="checkbox" name="hobi[]" id="membaca" value="Membaca"/><label for="membaca">Membaca</label>
                        <input type="checkbox" name="hobi[]" id="olahraga" value="Olahraga" /><label for="olahraga">Olahraga</label>
                        <input type="checkbox" name="hobi[]" id="madang" value="Madang" /><label for="madang">Madang</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="foto">FOTO</label></td>
                    <td>:</td>
                    <td><input type="file" name="foto" id="foto"></td>
                </tr>
                <tr>
                    <td><label for="alamat">Alamat</label></td>
                    <td>:</td>
                    <td><textarea name="alamat" id="alamat"></textarea></td>
                </tr>
                <tr>
                    <td><label for="jurusan">Jurusan</label></td>
                    <td>:</td>
                    <td>
                        <select name="jurusan" id="jurusan">
                            <option value="ti">Teknik Informatika</option>
                            <option value="si">Sistem Informasi</option>
                            <option value="tm">Teknik Mesin</option>
                        </select>
                    </td>
                </tr>
            </table>
            <input type="submit" name="submit" value="Kirim Data">
